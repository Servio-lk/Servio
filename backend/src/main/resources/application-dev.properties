# Development Profile

# Server Configuration
server.port=${PORT:3001}
server.servlet.context-path=/

# Embedded H2 database for local development
spring.datasource.url=jdbc:h2:mem:servio;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

# Logging
logging.level.root=INFO
logging.level.com.servio=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# JWT Configuration
jwt.secret=dev-secret-key-change-in-production-at-least-32-characters-long
jwt.expiration=86400000

# CORS Configurations - Add the network IP for mobile/LAN testing
cors.allowed-origins=http://localhost:*,http://127.0.0.1:*,http://192.168.*:*,http://10.185.*:*

# DevTools
spring.devtools.restart.enabled=true
