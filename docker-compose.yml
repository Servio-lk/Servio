
services:
  # Backend API (Spring Boot)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: servio-backend
    restart: always
    env_file:
      - .env
    environment:
      # Database — values come from .env
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-6543}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-postgres}
      # JWT — values come from .env
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-604800000}
      # Supabase — values come from .env
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      # CORS
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:80,http://localhost:5173}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173,http://localhost:3000,http://localhost,http://localhost:80}
      # PayHere
      - PAYHERE_MERCHANT_ID=${PAYHERE_MERCHANT_ID:-1219999}
      - PAYHERE_MERCHANT_SECRET=${PAYHERE_MERCHANT_SECRET}
      - PAYHERE_SANDBOX=${PAYHERE_SANDBOX:-true}
    ports:
      - "3001:3001"
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - servio-network

  # Frontend (React/Vite via Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
        - VITE_SUPABASE_URL=${SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    container_name: servio-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    mem_limit: 64m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - servio-network

networks:
  servio-network:
    driver: bridge
